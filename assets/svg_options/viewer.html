<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Icon Chooser</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #1e1e24;
            color: #fff;
            padding: 40px;
            margin: 0;
        }
        h1 { text-align: center; margin-bottom: 40px; font-weight: 300; }
        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 20px;
            margin-bottom: 60px;
        }
        .category-title {
            grid-column: 1 / -1;
            font-size: 1.5rem;
            margin-bottom: 10px;
            border-bottom: 1px solid #444;
            padding-bottom: 10px;
            color: #57DEE3;
        }
        .icon-card {
            background: #2a2a35;
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }
        .icon-card:hover {
            background: #333342;
            transform: translateY(-2px);
        }
        .icon-card.selected {
            border-color: #57DEE3;
            background: #233a40;
        }
        .icon-card svg {
            width: 48px;
            height: 48px;
            stroke: currentColor;
            fill: none;
            margin-bottom: 15px;
            stroke-width: 1.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .icon-label {
            font-size: 14px;
            color: #aaa;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <h1>Select Icons for Multiplayer Diagram</h1>

    <div class="grid" id="iconGrid">
        <div class="category-title">Microphones</div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
            <div class="icon-label">Microphone 1</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="m11 7.601-5.994 8.19a1 1 0 0 0 .1 1.298l.817.818a1 1 0 0 0 1.314.087L15.09 12"/><path d="M16.5 21.174C15.5 20.5 14.372 20 13 20c-2.058 0-3.928 2.356-6 2-2.072-.356-2.775-3.369-1.5-4.5"/><circle cx="16" cy="7" r="5"/></svg>
            <div class="icon-label">Microphone 2</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="m12 8-9.059 9.059a1 1 0 0 0 0 1.414l.53.53a1 1 0 0 0 1.414 0L14 10"/><path d="M15 13a3 3 0 1 0-4.243-4.243"/><path d="m12.757 8.757 2.829 2.829"/><circle cx="17.5" cy="5.5" r="2.5"/></svg>
            <div class="icon-label">Microphone 3</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><rect width="8" height="14" x="8" y="2" rx="4"/><path d="M4 10v2a8 8 0 0 0 16 0v-2"/><path d="M12 18v4"/><path d="M8 22h8"/></svg>
            <div class="icon-label">Microphone 4</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M9 5a3 3 0 0 1 3-3h0a3 3 0 0 1 3 3v5a3 3 0 0 1-3 3h0a3 3 0 0 1-3-3z"/><path d="M5 10a7 7 0 0 0 14 0"/><path d="M8 21l8 0"/><path d="M12 17l0 4"/></svg>
            <div class="icon-label">Microphone 5</div>
        </div>

        <div class="category-title">Synthesizers</div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M18.5 8c-1.4 0-2.6-.8-3.2-2A6.87 6.87 0 0 0 2 9v11a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-8.5C22 9.6 20.4 8 18.5 8"/><path d="M2 14h20"/><path d="M6 14v4"/><path d="M10 14v4"/><path d="M14 14v4"/><path d="M18 14v4"/></svg>
            <div class="icon-label">Synth 1</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><path d="m9 9 12-2"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <div class="icon-label">Synth 2</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M3 5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><path d="M3 13h18"/><path d="M8 13v4"/><path d="M12 13v4"/><path d="M16 13v4"/></svg>
            <div class="icon-label">Synth 3</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" rx="2"/><path d="M6 5v6"/><path d="M10 5v6"/><path d="M14 5v6"/><path d="M18 5v6"/><path d="M2 15h20"/></svg>
            <div class="icon-label">Synth 4</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M3 12h3c1.5 0 2-1 3.5-1s2 1 3.5 1 2-1 3.5-1 2 1 3.5 1h3"/><path d="M3 6h3c1.5 0 2-1 3.5-1s2 1 3.5 1 2-1 3.5-1 2 1 3.5 1h3"/><path d="M3 18h3c1.5 0 2-1 3.5-1s2 1 3.5 1 2-1 3.5-1 2 1 3.5 1h3"/></svg>
            <div class="icon-label">Synth 5</div>
        </div>

        <div class="category-title">Electric Guitars</div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="m11.9 12.1 4.514-4.514"/><path d="M20.1 2.3a1 1 0 0 0-1.4 0l-1.114 1.114A2 2 0 0 0 17 4.828v1.344a2 2 0 0 1-.586 1.414A2 2 0 0 1 17.828 7h1.344a2 2 0 0 0 1.414-.586L21.7 5.3a1 1 0 0 0 0-1.4z"/><path d="m6 16 2 2"/><path d="M8.23 9.85A3 3 0 0 1 11 8a5 5 0 0 1 5 5 3 3 0 0 1-1.85 2.77l-.92.38A2 2 0 0 0 12 18a4 4 0 0 1-4 4 6 6 0 0 1-6-6 4 4 0 0 1 4-4 2 2 0 0 0 1.85-1.23z"/></svg>
            <div class="icon-label">Guitar 1</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M6.07 10.368c-1.39-4.22-3.35-7.14-5.26-7.39c-2.48-.32-4.41 3.58-4.32 8.71c.09 5.12 2.18 9.53 4.67 9.85c1.9.24 3.99-2.31 5.4-6.04c.8-2.12 1.09-4.04.81-5.61Z"/><circle cx="5" cy="5" r="1"/></svg>
            <div class="icon-label">Guitar 2</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
            <div class="icon-label">Guitar 3</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><circle cx="8" cy="18" r="4"/><path d="M12 18V2l7 4"/></svg>
            <div class="icon-label">Guitar 4</div>
        </div>
        <div class="icon-card" onclick="this.classList.toggle('selected')">
            <svg viewBox="0 0 24 24"><path d="M14.5 15a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0z"/><path d="M14.5 15V2.5l7 2.5v10a4.5 4.5 0 1 1-9 0z"/></svg>
            <div class="icon-label">Guitar 5</div>
        </div>
    </div>
</body>
</html>
